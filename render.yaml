services:
  - type: web
    name: uabams-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_NAME
        value: uabams
      - key: MONGODB_URL
        sync: false
      - key: GATEWAY_API_KEY_GW01
        sync: false
      - key: GATEWAY_API_KEY_GW02
        sync: false
      - key: JWT_SECRET
        sync: false
