services:
  postgres:
    image: postgres:16-alpine
    container_name: uabams_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: uabams_db_user
      POSTGRES_PASSWORD: uUBZbdHXte5FYIFph5bDmx1szS0Hon6w
      POSTGRES_DB: uabams_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  uabams-cloud:
    build: .
    container_name: uabams_app
    ports:
      - "8000:8000"
    environment:
      DATABASE_TYPE: postgres
      DATABASE_URL: postgresql://uabams_db_user:uUBZbdHXte5FYIFph5bDmx1szS0Hon6w@postgres:5432/uabams_db
      JWT_SECRET: local-docker-change-me
      JWT_ALGORITHM: HS256
      ADMIN_RESET_KEY: local-admin-key
      OPERATOR_USERNAME: admin
      OPERATOR_PASSWORD: admin123
    depends_on:
      - postgres
    restart: always

volumes:
  postgres_data:
